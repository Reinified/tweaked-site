<div class="bg-white/5 p-4 border border-white/10 space-y-4">
    <h2 class="text-[9px] font-bold text-[#ffad5b] uppercase tracking-widest">Activity</h2>

    <!-- Current Activity-->>
    <div>
        <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-2">Current activity</p>
        <div id="current-activity-display" class="bg-black/20 p-3 border border-white/5 flex items-center gap-3">
            <p class="text-xs text-gray-500">Loading...</p>
        </div>
    </div>

    <!-- Recent Activity -->
    <div>
        <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-2">Recent activity</p>
        <div id="recent-activity-list" class="flex flex-col gap-2">
            <p class="text-[10px] text-gray-500 px-3">No recent activity.</p>
        </div>
    </div>
</div>

<script>
    window.addEventListener('message', (event) => {
        if (event.data.type !== 'UPDATE_ACTIVITY') return;
        const { activities, discord_status } = event.data.payload;

        const currentDisplay = document.getElementById('current-activity-display');
        const recentList = document.getElementById('recent-activity-list');
        if (!currentDisplay || !recentList) return;

        // Find the best activity to show (Prioritize Games, then Spotify, then Custom Status)
        let currentAct = activities.find(a => a.type === 0); // Playing
        if (!currentAct) currentAct = activities.find(a => a.type === 2); // Listening
        if (!currentAct) currentAct = activities.find(a => a.type !== 4); // Anything else
        
        if (currentAct && discord_status !== 'offline') {
            const actName = currentAct.name || 'Unknown';
            const actDetails = currentAct.details || '';
            const actState = currentAct.state || '';
            
            // Set the verb (Playing, Listening, etc.)
            let verb = 'Playing';
            if (currentAct.type === 2) verb = 'Listening to';
            if (currentAct.type === 3) verb = 'Watching';
            
            // Get Image (Handling Spotify's weird encrypted URLs safely)
            let imgHtml = '';
            if (currentAct.assets && currentAct.assets.large_image) {
                let imgUrl = currentAct.assets.large_image;
                
                // Fix Spotify URLs
                if (imgUrl.startsWith('spotify:')) {
                    imgUrl = imgUrl.replace('spotify:', 'https://i.scdn.co/image/');
                } 
                // Fix Discord external media URLs
                else if (imgUrl.startsWith('mp:external')) {
                    imgUrl = `https://media.discordapp.net/${imgUrl.substring(3)}`;
                }
                // Standard Discord CDN
                else if (!imgUrl.startsWith('http')) {
                    imgUrl = `https://cdn.discordapp.com/${imgUrl}`;
                }

                imgHtml = `<img src="${imgUrl}" class="w-12 h-12 rounded object-cover flex-shrink-0 border border-white/10" onerror="this.style.display='none'">`;
            }

            currentDisplay.innerHTML = `
                ${imgHtml}
                <div class="min-w-0">
                    <p class="text-xs text-gray-500 truncate">${verb}</p>
                    <p class="text-xs text-white font-bold truncate">${actName}</p>
                    <p class="text-[10px] text-gray-400 truncate">${actDetails}</p>
                    ${actState ? `<p class="text-[10px] text-gray-500 truncate">${actState}</p>` : ''}
                </div>
            `;

            // Save to history (Checking if it changed so we don't spam the same song)
            const historyKey = actName + actDetails;
            if (!window.lastActivityKey || window.lastActivityKey !== historyKey) {
                window.lastActivityKey = historyKey;
                saveToHistory(actName, actDetails, verb, imgHtml);
            }

        } else {
            currentDisplay.innerHTML = `<p class="text-xs text-gray-500">Currently offline or doing nothing.</p>`;
        }

        renderHistory();
    });

    function saveToHistory(name, details, type, img) {
        let history = JSON.parse(localStorage.getItem('activity_history') || '[]');
        history.unshift({ name, details, type, img, time: Date.now() });
        if (history.length > 5) history = history.slice(0, 5);
        localStorage.setItem('activity_history', JSON.stringify(history));
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('activity_history') || '[]');
        const list = document.getElementById('recent-activity-list');
        
        if (history.length === 0) {
            list.innerHTML = `<p class="text-[10px] text-gray-500 px-3">No recent activity.</p>`;
            return;
        }

        list.innerHTML = history.map(item => {
            const timeAgo = getTimeAgo(item.time);
            return `
                <div class="bg-black/20 p-3 border border-white/5 flex items-center gap-3">
                    ${item.img}
                    <div class="min-w-0 flex-1">
                        <p class="text-[10px] text-gray-500">${item.type}</p>
                        <p class="text-xs text-white font-bold truncate">${item.name}</p>
                        <p class="text-[10px] text-gray-400 truncate">${item.details}</p>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <p class="text-[9px] text-gray-500">${timeAgo}</p>
                    </div>
                </div>
            `;
        }).join('');
    }

    function getTimeAgo(timestamp) {
        const seconds = Math.floor((Date.now() - timestamp) / 1000);
        if (seconds < 60) return 'Just now';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        return `${days}d ago`;
    }
</script>
