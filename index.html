<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>soulz</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background-image: url("background.png");
    background-color: #0a0a0a;
    background-size: cover;
    background-position: center;
    color: #ddd;
    font-family: 'Space Grotesk', sans-serif;
}

.glass {
    background: rgba(15, 10, 5, 0.6);
    backdrop-filter: blur(16px);
    border: 1px solid #eaa8e1;
}

.hidden { display: none; }
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div id="app" class="w-full max-w-4xl glass p-4">

<!-- NAV -->
<div class="flex gap-2 mb-4">
    <button onclick="showPage('home')" class="flex-1 bg-white/10 py-2 text-xs">Home</button>
    <button onclick="showPage('about')" class="flex-1 bg-white/10 py-2 text-xs">About</button>
    <button onclick="showPage('favorites')" class="flex-1 bg-white/10 py-2 text-xs">Favorites</button>
</div>

<!-- HOME -->
<div id="home">
    <h1 class="text-2xl font-bold">soulz</h1>
    <p class="text-sm text-gray-400">20yo guy who loves cats</p>

    <div class="mt-4">
        <h2 class="text-sm text-[#ffad5b]">Cool People</h2>
        <div class="flex gap-4 mt-2">
            <a href="https://twixxt.defautluser0.xyz/" target="_blank">twixxty</a>
            <a href="https://lamp.delivery" target="_blank">lamp</a>
            <a href="https://www.raincord.dev/" target="_blank">coco</a>
        </div>
    </div>
</div>

<!-- ABOUT -->
<div id="about" class="hidden">
    <h1 class="text-xl font-bold mb-2">About Me</h1>
    <p class="text-sm text-gray-300">
        Hi, I’m soulz. I really really love cats.
        This is where you can expand your story.
    </p>
</div>

<!-- FAVORITES -->
<div id="favorites" class="hidden">
    <h1 class="text-xl font-bold mb-2">Favorites</h1>
    <ul class="text-sm text-gray-300 list-disc ml-5">
        <li>LittleBigPlanet</li>
        <li>Smash Into Pieces</li>
    </ul>
</div>

</div>

<script>
function showPage(page) {
    document.getElementById('home').classList.add('hidden');
    document.getElementById('about').classList.add('hidden');
    document.getElementById('favorites').classList.add('hidden');

    document.getElementById(page).classList.remove('hidden');
}
</script>

</body>
</html>
